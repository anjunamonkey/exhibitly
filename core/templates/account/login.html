{% extends "account/base.html" %}
{% load i18n %}
{% block head %}
    <title>Log In</title>
{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-500">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold mb-6 text-center text-blue-700">Log In</h2>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.email.label_tag }}
            <input type="email" name="login" class="w-full px-4 py-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            {{ form.password.label_tag }}
            <input type="password" name="password" class="w-full px-4 py-2 mb-6 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Log In</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Don't have an account? <a href="/accounts/signup/" class="text-blue-600 font-bold">Sign up</a></p>
    </div>
</div>
{% endblock %}
