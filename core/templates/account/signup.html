{% extends "account/base.html" %}
{% load i18n %}
{% block head %}
    <title>Sign Up</title>
{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-500 to-blue-500">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold mb-6 text-center text-purple-700">Sign Up</h2>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.email.label_tag }}
            <input type="email" name="email" class="w-full px-4 py-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" required>
            {{ form.password1.label_tag }}
            <input type="password" name="password1" class="w-full px-4 py-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" required>
            {{ form.password2.label_tag }}
            <input type="password" name="password2" class="w-full px-4 py-2 mb-6 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" required>
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 transition">Sign Up</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Already have an account? <a href="/accounts/login/" class="text-purple-600 font-bold">Log in</a></p>
    </div>
</div>
{% endblock %}
