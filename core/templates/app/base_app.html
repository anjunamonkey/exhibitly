<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}A/Bite Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Palette matched to core/abite.html (landing page)
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#EA4949',
                        customgray: '#ECECEC',
                        lightgray: '#F7F7F7',
                        darkgray: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 260px;
            height: calc(100vh - 100px);
            background: #1A1A1A;
            border-right: 1px solid rgba(255,255,255,0.04);
            overflow-y: auto;
            z-index: 100;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            color: #E5E7EB;
        }
        
        .sidebar-item {
            transition: all 0.12s ease;
            color: #E5E7EB;
        }
        
        .sidebar-item:hover {
            background: rgba(255,255,255,0.03);
            color: #ffffff;
        }
        
        .sidebar-item.active {
            background: rgba(234,73,73,0.08);
            border-right: 3px solid #EA4949;
            color: #EA4949;
        }

        .sidebar .text-gray-500 { color: #9CA3AF !important; }
        .sidebar h2, .sidebar h3 { color: #E5E7EB !important; }
        .sidebar i { color: inherit; }
        
        .main-content {
            margin-left: 300px;
            padding-right: 20px;
            padding-left: 24px;
            max-width: calc(100% - 360px);
        }

        .chart-card {
            min-height: 260px;
            display: flex;
            flex-direction: column;
        }

        .chart-card canvas {
            width: 100% !important;
            height: 100% !important;
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="bg-lightgray text-gray-900">

    <!-- Sidebar Navigation -->
    {% include 'app/sidebar.html' %}
    <!-- Main Content -->
    <div class="main-content pt-6 pb-12 px-8">
        {% block page_content %}{% endblock %}
    </div>

</body>
</html>
