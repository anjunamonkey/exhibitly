<!DOCTYPE html>
{% load static %}
    <!-- Navigation -->

    <!-- Nav: starts transparent (for hero), becomes blurred + semi-opaque on scroll -->
    <nav id="site-header" class="fixed top-2 z-50 left-1/2 transform -translate-x-1/2 w-full max-w-7xl rounded-xl transition-colors duration-300 ease backdrop-blur-sm bg-transparent">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex flex-col items-center">
                    <a href="/" class="block"><img src="{% static 'abite.png' %}" alt="A\Bite Logo" class="h-16"></a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <div class="relative group" tabindex="0" id="features-dropdown-parent">
                        <a
                            type="button"
                            class="header-link text-gray-300 hover:text-primary transition font-medium focus:outline-none cursor-pointer flex items-center"
                            aria-haspopup="true"
                            aria-expanded="false"
                            id="features-dropdown-trigger"
                        >
                            Features
                            <svg class="inline-block ml-1 w-4 h-4 text-gray-400 group-hover:text-primary transition" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-width="2" d="M6 8l4 4 4-4"/></svg>
                        </a>
                        <div
                            id="features-dropdown"
                            class="absolute left-0 top-full w-56 bg-white rounded-xl shadow-lg border border-gray-100 opacity-0 pointer-events-none transition z-50"
                            style="transition:opacity 0.2s"
                        >
                            <a href="/#dynamic-pricing" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary rounded-t-xl font-medium">AI Dynamic Pricing</a>
                            <a href="/#features" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary font-medium">A/B Testing Suite</a>
                            <a href="/#offering-summary" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary font-medium">Smart Promotions</a>
                            <a href="/#personalised" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary rounded-b-xl font-medium">Personalised Menus</a>
                        </div>
                    </div>
                    <a href="#use-cases" class="header-link text-gray-300 hover:text-primary transition font-medium">Use Cases</a>
                    <a href="/pricing/" class="header-link text-gray-300 hover:text-primary transition font-medium">Pricing</a>
                </div>
                <a href="/dashboard/">
                <button id="header-cta" class="header-cta bg-primary text-white px-8 py-3 rounded-lg font-semibold hover:bg-red-600 transition shadow-lg hover:shadow-xl transform hover:scale-105">
                    Get Started
                </button>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header: wait until hero is scrolled past, then toggle styles -->
    <script>
    (function () {
      const header = document.getElementById('site-header');
      if (!header) return;
      const links = header.querySelectorAll('.header-link');
      const cta = header.querySelector('.header-cta');
    const SCROLL_LOCK = {{ scroll_lock|default:0 }}; // Use context variable with default


      function setTransparent() {
        header.style.backgroundColor = 'transparent';
        header.classList.remove('shadow-md');
        links.forEach(a => {
          a.classList.remove('text-gray-700');
          a.classList.add('text-gray-300');
        });
      }

      function setScrolled() {
        header.style.backgroundColor = 'rgba(236, 236, 236, 0.95)'; // #ECECEC
        header.classList.add('shadow-md');
        links.forEach(a => {
          a.classList.remove('text-gray-300');
          a.classList.add('text-gray-700');
        });
      }

      function updateHeader() {
        // strictly enforce the 900px lock: header remains transparent until scrollY > SCROLL_LOCK
        if (window.scrollY > SCROLL_LOCK) {
          setScrolled();
        } else {
          setTransparent();
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        updateHeader();
        window.addEventListener('scroll', updateHeader, { passive: true });
        window.addEventListener('resize', updateHeader);
      });
    })();
    </script>
    <script>
    // Dropdown open/close logic for click and hover
    (function() {
        const parent = document.getElementById('features-dropdown-parent');
        const trigger = document.getElementById('features-dropdown-trigger');
        const dropdown = document.getElementById('features-dropdown');
        let closeTimeout;

        // Helper to show/hide dropdown
        function setDropdown(open) {
            if (open) {
                dropdown.style.opacity = '1';
                dropdown.style.pointerEvents = 'auto';
                trigger.setAttribute('aria-expanded', 'true');
            } else {
                dropdown.style.opacity = '0';
                dropdown.style.pointerEvents = 'none';
                trigger.setAttribute('aria-expanded', 'false');
            }
        }

        // Mouse hover with timeout to prevent premature close
        parent.addEventListener('mouseenter', () => {
            clearTimeout(closeTimeout);
            setDropdown(true);
        });
        parent.addEventListener('mouseleave', () => {
            closeTimeout = setTimeout(() => setDropdown(false), 150); // 150ms delay
        });

        // Click toggle
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            clearTimeout(closeTimeout);
            setDropdown(dropdown.style.opacity !== '1');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!parent.contains(e.target)) {
                clearTimeout(closeTimeout);
                setDropdown(false);
            }
        });

        // Keyboard accessibility
        trigger.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearTimeout(closeTimeout);
                setDropdown(false);
            }
            if (e.key === 'ArrowDown') setDropdown(true);
        });
    })();
    </script>
