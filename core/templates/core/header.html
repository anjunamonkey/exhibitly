<!DOCTYPE html>
{% load static %}


    <!-- Navigation -->

    <!-- Nav: starts transparent (for hero), becomes blurred + semi-opaque on scroll -->
    <nav id="site-header" class="border border-gold fixed top-4 z-50 left-1/2 transform -translate-x-1/2 w-full max-w-7xl rounded-xl transition-colors duration-300 ease backdrop-blur-sm bg-transparent">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex flex-col items-center">
            <a href="/" class="header-link flex-shrink-0 flex items-center h-9 font-display font-light text-cream leading-none animate-fade-up text-xl">
                Exhibitly
                <!-- <img src="{% static 'logo.png' %}" alt="Exhibitly" class="h-9"> -->
            </a>
                </div>
                <div class="hidden md:flex space-x-8 nav-links">
                    <div class="relative group" tabindex="0" id="features-dropdown-parent">
                        <a
                            type="button"
                            class="header-link text-gray-300 hover:text-primary transition font-medium focus:outline-none cursor-pointer flex items-center"
                            aria-haspopup="true"
                            aria-expanded="false"
                            id="features-dropdown-trigger"
                        >
                            Features
                            <svg class="inline-block ml-1 w-4 h-4 text-gray-400 group-hover:text-primary transition" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-width="2" d="M6 8l4 4 4-4"/></svg>
                        </a>
                        <div
                            id="features-dropdown"
                            class="absolute left-0 top-full w-56 bg-white rounded-xl shadow-lg border border-gray-100 opacity-0 pointer-events-none transition z-50"
                            style="transition:opacity 0.2s"
                        >
                            <a href="/#overview" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary rounded-t-xl font-medium">Overview</a>
                            <a href="/#ab-features" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary font-medium">A/B Testing Suite</a>
                            <a href="/#dynamic-pricing" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary font-medium">Dynamic Pricing</a>
                            <a href="/#promotions-section" class="block px-5 py-3 text-gray-700 hover:bg-primary/10 hover:text-primary rounded-b-xl font-medium">Smart Promotions</a>
                        </div>
                    </div>
                    <a href="/museums" class="header-link text-gray-300 hover:text-primary transition font-medium">For Museums</a>
                    <!-- <a href="#use-cases" class="header-link text-gray-300 hover:text-primary transition font-medium">Use Cases</a> -->
                    <a href="/kids/" class="header-link text-gray-300 hover:text-primary transition font-medium">For Kids</a>
                </div>
                <a href="/app/">
                <button id="header-cta" class="header-cta border border-gold bg-primary text-white px-8 py-3 rounded-lg font-semibold hover:bg-gold hover:text-charcoal transition shadow-lg hover:shadow-xl transform hover:scale-105">
                    Get Started
                </button>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header: wait until hero is scrolled past, then toggle styles -->
    <script>
(function () {
  const header = document.getElementById('site-header');
  if (!header) return;
  const links = header.querySelectorAll('.header-link');

  function applyTheme(theme) {
    if (theme === 'dark') {
      header.style.backgroundColor = 'transparent';
      header.classList.remove('shadow-md');
      links.forEach(a => {
        a.classList.remove('text-gray-700');
        a.classList.add('text-gray-300');
        document.getElementById('header-cta').classList.remove('text-black');
      });
    } else {
    //   header.style.backgroundColor = 'bg-gold-light/30';
      header.classList.add('shadow-md');
      document.getElementById('header-cta').classList.add('text-black');
      links.forEach(a => {
        a.classList.remove('text-gray-300');
        a.classList.add('text-gray-700');
      });
    }
  }

  applyTheme('dark');

  document.addEventListener('DOMContentLoaded', function () {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          applyTheme(entry.target.dataset.headerTheme);
        }
      });
    }, {
      rootMargin: '-80px 0px -80% 0px',
      threshold: 0
    });

    document.querySelectorAll('[data-header-theme]').forEach(el => observer.observe(el));
  });
})();

</script>
